<style>

    margin: 12px 0 18px;
  }

  .button-grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 270px;
    margin: 0 auto;
    padding: 0 0 30px;
  }

  .menu-page {
    display: none;
    flex-direction: column;
    gap: 16px;
    width: 100%;
  }

  .menu-page.active {

  }

  .menu-btn {
    width: 100%;

    border: none;
    border-radius: 18px;
    font-size: 18px;
    font-weight: bold;
    color: #555;
    background: #fff0f6;

    cursor: pointer;
    display: block;
  }

  .menu-btn:active {
    transform: translateY(4px);
    box-shadow: 0 1px 0 #ffd1e6, 0 4px 8px rgba(0,0,0,0.08);
  }

  .page-nav {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    z-index: 80;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
    user-select: none;
  }

  .page-nav.left-nav {
    left: 9px;
  }

  .page-nav.right-nav {
    right: 9px;
  }

  .page-arrow {
    width: 44px;
    height: 44px;
    border: none;
    border-radius: 999px;
    background: #111;
    color: white;
    font-size: 24px;
    line-height: 1;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 5px 14px rgba(0,0,0,0.24);
    cursor: pointer;
    animation: slowPulse 2.6s ease-in-out infinite;
  }

  .page-arrow:active {
    transform: scale(0.92);
  }

  .page-nav.disabled {
    opacity: 0.22;
    pointer-events: none;
  }

  .page-nav.disabled .page-arrow {
    background: rgba(0,0,0,0.45);
    box-shadow: none;
  }

  .page-nav-label {
    min-width: 48px;
    padding: 3px 6px;
    border-radius: 999px;
    background: rgba(255,255,255,0.78);
    color: #222;
    font-size: 12px;
    font-weight: bold;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  @keyframes slowPulse {
    0%, 100% {
      transform: scale(1);
      box-shadow: 0 5px 14px rgba(0,0,0,0.24);
    }
    50% {
      transform: scale(1.11);
      box-shadow: 0 8px 22px rgba(0,0,0,0.34);

<script>

function closeStartNotice() {
  const notice = document.getElementById("startNotice");
  if (notice) {
    notice.style.display = "none";
  }
}


let currentMenuPage = 0;
const menuPageNames = ["基礎", "初級", "初中級"];

function updateMenuPage() {
  document.querySelectorAll(".menu-page").forEach((page, index) => {
    page.classList.toggle("active", index === currentMenuPage);
  });

  const leftNav = document.getElementById("leftPageNav");
  const rightNav = document.getElementById("rightPageNav");
  const leftLabel = document.getElementById("leftPageLabel");
  const rightLabel = document.getElementById("rightPageLabel");

  if (!leftNav || !rightNav || !leftLabel || !rightLabel) return;

  const hasPrev = currentMenuPage > 0;
  const hasNext = currentMenuPage < menuPageNames.length - 1;

  leftNav.classList.toggle("disabled", !hasPrev);
  rightNav.classList.toggle("disabled", !hasNext);

  leftLabel.textContent = hasPrev ? menuPageNames[currentMenuPage - 1] : "";
  rightLabel.textContent = hasNext ? menuPageNames[currentMenuPage + 1] : "";
}

function changeMenuPage(direction) {
  const nextPage = currentMenuPage + direction;
  if (nextPage < 0 || nextPage >= menuPageNames.length) return;
  currentMenuPage = nextPage;
  updateMenuPage();
  window.scrollTo(0, 0);
}

let maskAnimationId = null;
let tableVisible = false;
let masuSwapped = false;

function showTable(type) {
  document.getElementById("menuScreen").style.display = "none";
  document.getElementById("tableScreen").style.display = "block";
  document.getElementById("tableTitle").textContent = type;

  tableVisible = true;

  if (type === "Vます") {
    masuSwapped = false;
    makeMasuTable();
  } else if (type === "Vたい" || type === "たい") {
    makeTaiTable();
  } else if (type === "Vて") {
    makeTeTable();
  } else if (type === "Vた") {
    makeTaTable();
  } else if (type === "Vない") {
    makeNaiTable();
  } else if (type === "Vなかった") {
    makeNakattaTable();
  } else if (type === "ませんか" || type === "Vませんか" || type === "Vませか") {
    makeMasenkaTable();
  } else if (type === "ましょう" || type === "Vましょう") {
    makeMashouTable();
  } else if (type === "てもいいですか" || type === "Vてもいいですか") {
    makeTemoiiTable();
  } else if (type === "ています" || type === "Vています") {
    makeTeimasuTable();
  } else if (type === "たり" || type === "Vたり") {
    makeTariTable();
  } else if (type === "たら" || type === "Vたら") {
    makeTaraTable();
  } else if (type === "Vてきます") {
    makeTekimasuTable();
  } else if (type === "Vよう" || type === "よう") {
    makeYouTable();
  } else if (type === "V可能" || type === "可能" || type === "可能形") {
    makePotentialTable();
  } else if (type === "Vられる") {
    makePassiveTable();
  } else if (type === "Vさせる") {
    makeCausativeTable();
  } else if (type === "Vさせられる") {
    makeCausativePassiveTable();
  } else if (type === "形くて" || type === "形-て") {
    makeAdjectiveKuteTable();
  } else if (type === "形かった" || type === "形-た") {
    makeAdjectiveKattaTable();
  } else if (type === "形くない" || type === "形-ない") {
    makeAdjectiveKunaiTable();
  } else if (type === "形くなかった" || type === "形-なかった") {
    makeAdjectiveKunakattaTable();
  } else if (type === "とき") {
    makeTokiTable();
  } else {
    showPlaceholder(type);
  }

  window.scrollTo(0, 0);

  requestAnimationFrame(() => {
    adjustScrollExtraHeight();
    updateSheetHiddenText();
    startMaskLoop();
  });
}

function backMenu() {
  tableVisible = false;
  stopMaskLoop();
  clearAllMasks();

  document.getElementById("tableScreen").style.display = "none";
  document.getElementById("menuScreen").style.display = "block";

  window.scrollTo(0, 0);
}

function makeQuestionButton() {
  return `
    <button class="question-box" type="button" onclick="toggleQuestionMark(this)" aria-label="チェック">
      <svg class="question-svg" viewBox="0 0 30 30" aria-hidden="true">
        <text class="question-glyph" x="15" y="25" text-anchor="middle">?</text>
      </svg>
    </button>
  `;
}

function makeWordCell(word) {
  return `
    <div class="word-cell-inner">
      ${makeQuestionButton()}
      <span class="word-text">${word}</span>
    </div>
  `;
}

function makeMasuHeaderCell(label) {
  return `<th>${label}</th>`;
}

function makeMasuBodyRow(row, extraClass = "") {
  /*
    Vます専用：
    入れ替え前も入れ替え後も、左は黒い問題側、右は赤い答え側にする。
    右側だけ answer-text を付けるので、赤シートと重なった部分だけ消える。
  */
  const left = masuSwapped
    ? makeWordCell(row[1])
    : makeWordCell(row[0]);

  const right = masuSwapped
    ? `<span class="answer-text">${row[0]}</span>`
    : `<span class="answer-text">${row[1]}</span>`;

  return `
      <tr class="${extraClass}">
        <td>${left}</td>
        <td class="masu-swap-spacer"></td>
        <td>${right}</td>
      </tr>
    `;
}

function toggleMasuSwap() {
  masuSwapped = !masuSwapped;
  makeMasuTable();

  requestAnimationFrame(() => {
    adjustScrollExtraHeight();
    updateSheetHiddenText();
  });
}

function makeMasuTable() {
  const leftTitle = masuSwapped ? "マス形" : "動詞の原形";
  const rightTitle = masuSwapped ? "動詞の原形" : "マス形";

  let html = `
    <table class="masu-table">
      <colgroup>
        <col class="masu-side-col">
        <col class="masu-swap-col">
        <col class="masu-side-col">
      </colgroup>
      <tr>
        ${makeMasuHeaderCell(leftTitle)}
        <th class="masu-swap-head">
          <button class="masu-swap-btn" type="button" onclick="toggleMasuSwap()" aria-label="原形とマス形を入れかえる">⇔</button>
        </th>
        ${makeMasuHeaderCell(rightTitle)}
      </tr>

      <tr class="group-row">
        <td colspan="3">五段動詞</td>
      </tr>
  `;

  godanData.forEach(row => {
    html += makeMasuBodyRow(row);
  });

  html += `
      <tr class="group-row">
        <td colspan="3">一段動詞</td>
      </tr>
  `;

  ichidanData.forEach(row => {
    html += makeMasuBodyRow(row, "ichidan");
  });

  html += `
      <tr class="group-row">
        <td colspan="3">不規則動詞</td>
      </tr>
  `;

  irregularData.forEach(row => {
    html += makeMasuBodyRow(row);
  });

  html += `
    </table>
    <div class="scroll-extra-y"></div>
  `;

  document.getElementById("tableArea").innerHTML = html;

  requestAnimationFrame(() => {
    adjustScrollExtraHeight();
    updateSheetHiddenText();
  });
}

function makeGroupedExpressionTable(title, data) {
  let html = `
    <table>
      <tr>
        <th>ヒント</th>
        <th>${title}</th>
      </tr>
  `;

  const groups = [
    ["五段動詞", data.godan],
    ["一段動詞", data.ichidan],
    ["不規則動詞", data.irregular]
  ];

  groups.forEach(group => {
    html += `
      <tr class="group-row">
        <td colspan="2">${group[0]}</td>
      </tr>
    `;

    group[1].forEach(row => {

function showPlaceholder(type) {

    <div class="placeholder">
      ${type} の表は後で入れる

    <div class="scroll-extra-y"></div>
  `;

  requestAnimationFrame(() => {

    updateSheetHiddenText();
  });
}

function toggleQuestionMark(button) {
  button.classList.toggle("active");
}

function adjustScrollExtraHeight() {
  const extra = document.querySelector(".scroll-extra-y");
  const table = document.querySelector("#tableArea table");
  const topBar = document.querySelector(".top-bar");

  if (!extra || !table || !topBar) return;

  extra.style.height = "0px";

  const rows = Array.from(table.querySelectorAll("tr"))
    .filter(row => !row.classList.contains("group-row"))
    .filter(row => row.querySelector(".word-text"));

  if (rows.length < 2) {
    extra.style.height = "0px";
    return;
  }

  const secondLastRow = rows[rows.length - 2];

  const scrollY = window.scrollY;
  const rowTopInPage = secondLastRow.getBoundingClientRect().top + scrollY;
  const tableBottomInPage = table.getBoundingClientRect().bottom + scrollY;

  const topBarHeight = topBar.offsetHeight;
  const stopMargin = 8;

  const desiredMaxScroll = rowTopInPage - topBarHeight - stopMargin;
  const neededDocumentHeight = desiredMaxScroll + window.innerHeight;

  let extraHeight = neededDocumentHeight - tableBottomInPage;

  if (extraHeight < 0) {
    extraHeight = 0;
  }

  extra.style.height = `${extraHeight}px`;
}

function startMaskLoop() {
  if (maskAnimationId !== null) return;

  const loop = () => {
    if (!tableVisible) {
      maskAnimationId = null;
      return;
    }

    updateSheetHiddenText();
    maskAnimationId = requestAnimationFrame(loop);
  };

  maskAnimationId = requestAnimationFrame(loop);
}

function stopMaskLoop() {
  if (maskAnimationId !== null) {
    cancelAnimationFrame(maskAnimationId);
    maskAnimationId = null;
  }
}

function clearAllMasks() {
  document.querySelectorAll(".answer-text").forEach(text => {
    text.style.webkitMaskImage = "";
    text.style.maskImage = "";
    text.style.webkitMaskSize = "";
    text.style.maskSize = "";
    text.style.webkitMaskRepeat = "";
    text.style.maskRepeat = "";
    text.style.webkitMaskPosition = "";
    text.style.maskPosition = "";
  });
}

function getRotatedSheetPolygon(sheet) {
  const style = getComputedStyle(sheet);
  const width = sheet.offsetWidth;
  const height = sheet.offsetHeight;

  const top = parseFloat(style.top) || sheet.getBoundingClientRect().top;
  const right = parseFloat(style.right) || 0;

  const left = window.innerWidth - right - width;
  const originX = left + width;
  const originY = top + height / 2;

  const transform = style.transform;
  let angle = 0;

  if (transform && transform !== "none") {
    const match = transform.match(/matrix\(([^)]+)\)/);
    if (match) {
      const values = match[1].split(",").map(v => parseFloat(v.trim()));
      const a = values[0];
      const b = values[1];
      angle = Math.atan2(b, a);
    }
  }

  const points = [
    { x: left, y: top },
    { x: left + width, y: top },
    { x: left + width, y: top + height },
    { x: left, y: top + height }
  ];

  const cos = Math.cos(angle);
  const sin = Math.sin(angle);

  return points.map(p => {
    const dx = p.x - originX;
    const dy = p.y - originY;

    return {
      x: originX + dx * cos - dy * sin,
      y: originY + dx * sin + dy * cos
    };
  });
}

function polygonBounds(poly) {
  return {
    left: Math.min(...poly.map(p => p.x)),
    right: Math.max(...poly.map(p => p.x)),
    top: Math.min(...poly.map(p => p.y)),
    bottom: Math.max(...poly.map(p => p.y))
  };
}

function rectsOverlap(a, b) {
  return a.left < b.right && a.right > b.left && a.top < b.bottom && a.bottom > b.top;
}

function escapeSvgForDataUrl(svg) {
  return svg
    .replace(/#/g, "%23")
    .replace(/</g, "%3C")
    .replace(/>/g, "%3E")
    .replace(/"/g, "'")
    .replace(/\n/g, "")
    .replace(/\s{2,}/g, " ");
}

function updateSheetHiddenText() {
  const sheet = document.querySelector(".red-sheet");
  const texts = document.querySelectorAll(".answer-text");

  if (!sheet || texts.length === 0) return;

  const sheetPolygon = getRotatedSheetPolygon(sheet);
  const sheetBounds = polygonBounds(sheetPolygon);
  const padding = 3;

  texts.forEach(text => {
    const rect = text.getBoundingClientRect();
    const textBounds = {
      left: rect.left,
      right: rect.right,
      top: rect.top,
      bottom: rect.bottom
    };

    if (!rectsOverlap(sheetBounds, textBounds)) {
      text.style.webkitMaskImage = "";
      text.style.maskImage = "";
      return;
    }

    const width = Math.max(1, Math.ceil(rect.width + padding * 2));
    const height = Math.max(1, Math.ceil(rect.height + padding * 2));

    const points = sheetPolygon
      .map(p => `${(p.x - rect.left + padding).toFixed(2)},${(p.y - rect.top + padding).toFixed(2)}`)
      .join(" ");

    const svg = `
      <svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
        <defs>
          <mask id="redSheetMask" maskUnits="userSpaceOnUse">
            <rect x="0" y="0" width="${width}" height="${height}" fill="white"/>
            <polygon points="${points}" fill="black"/>
          </mask>
        </defs>
        <rect x="0" y="0" width="${width}" height="${height}" fill="white" mask="url(%23redSheetMask)"/>
      </svg>
    `;

    const url = `url("data:image/svg+xml,${escapeSvgForDataUrl(svg)}")`;

    text.style.webkitMaskImage = url;
    text.style.maskImage = url;
    text.style.webkitMaskSize = `${width}px ${height}px`;
    text.style.maskSize = `${width}px ${height}px`;
    text.style.webkitMaskRepeat = "no-repeat";
    text.style.maskRepeat = "no-repeat";
    text.style.webkitMaskPosition = `-${padding}px -${padding}px`;
    text.style.maskPosition = `-${padding}px -${padding}px`;
  });
}
